<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1c20;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

       .calculator {
            background: #24272b;
            padding: 30px;
            border-radius: 30px ;
            box-shadow: 20px 20px 60px #0e0f11, -20px -20px 60px #3a3f45;
            width: 360px;
        }

        .display {
            width: 100%;
            height: 80px;
            color: white;
            font-size: 3rem;
            text-align: right;
            margin-bottom: 20px;
            padding: 0 10px;
            overflow: hidden;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
             gap: 18px;
        }

        .btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            background: #24272b;
            color: #ccc;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
       
            box-shadow: inset 6px 6px 12px #0e0f11, inset -6px -6px 12px #3a3f45;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

  
        .btn.orange {
            background: #f36c1e;
            color: white;
            box-shadow: 0 0 15px rgba(243, 108, 30, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 2px 2px 5px #0e0f11, -2px -2px 5px #3a3f45;
        }

        .btn.orange:active {
            background: #d45a16;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display" id="screen">0</div>
    <div class="buttons">
        <button class="btn orange" onclick="clearScreen()">AC</button>
        <button class="btn orange" onclick="deleteChar()">DEL</button>
        <button class="btn orange" onclick="val('%')">%</button>
        <button class="btn orange" onclick="val('/')">/</button>
        
        <button class="btn" onclick="val('7')">7</button>
        <button class="btn" onclick="val('8')">8</button>
        <button class="btn" onclick="val('9')">9</button>
        <button class="btn orange" onclick="val('*')">*</button>
        
        <button class="btn" onclick="val('4')">4</button>
        <button class="btn" onclick="val('5')">5</button>
        <button class="btn" onclick="val('6')">6</button>
        <button class="btn orange" onclick="val('-')">-</button>
        
        <button class="btn" onclick="val('1')">1</button>
        <button class="btn" onclick="val('2')">2</button>
        <button class="btn" onclick="val('3')">3</button>
        <button class="btn orange" onclick="val('+')">+</button>
        
        <button class="btn" onclick="val('00')">00</button>
        <button class="btn" onclick="val('0')">0</button>
        <button class="btn" onclick="val('.')">.</button>
        <button class="btn orange" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');

    function val(input) {
        if (screen.innerText === '0') {
            screen.innerText = input;
        } else {
            screen.innerText += input;
        }
    }

    function clearScreen() {
        screen.innerText = '0';
    }

    function deleteChar() {
        if (screen.innerText.length > 1) {
            screen.innerText = screen.innerText.slice(0, -1);
        } else {
            screen.innerText = '0';
        }
    }

    function calculate() {
        try {

            screen.innerText = eval(screen.innerText.replace('%/g', '/100'));
        } catch (e) {
            screen.innerText = "Error";
            setTimeout(clearScreen, 1500);
        }
    }
</script>

</body>
</html>
